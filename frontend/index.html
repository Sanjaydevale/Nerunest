<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroNest — Log Today</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="dot"></span>
    NeuroNest
  </a>
  <div class="nav-links">
    <a href="index.html" class="active">Log</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="hero-tag">⚡ Daily Intelligence</div>
    <h1>How was your day?</h1>
    <p>Track your focus, sleep, and distractions. Earn credits for consistent improvement.</p>
  </div>

  <div class="card" style="animation-delay:0.1s">
    <div class="card-header">
      <div class="card-icon">📊</div>
      <div>
        <div class="card-title">Daily Activity Log</div>
        <div class="card-subtitle">User ID 1 · <span id="today-date"></span></div>
      </div>
    </div>

    <form id="log-form" onsubmit="return false;">
      <div class="form-grid">
        <div class="form-group slider-group">
          <div class="slider-label-row">
            <label for="studyHours">Study Hours</label>
            <span class="slider-val" id="study-val">4</span>
          </div>
          <input type="range" id="studyHours" name="studyHours" min="0" max="16" value="4"
            oninput="document.getElementById('study-val').textContent=this.value"/>
        </div>

        <div class="form-group slider-group">
          <div class="slider-label-row">
            <label for="sleepHours">Sleep Hours</label>
            <span class="slider-val" id="sleep-val">7</span>
          </div>
          <input type="range" id="sleepHours" name="sleepHours" min="0" max="12" value="7"
            oninput="document.getElementById('sleep-val').textContent=this.value"/>
        </div>

        <div class="form-group slider-group">
          <div class="slider-label-row">
            <label for="distractionHours">Distraction Hours</label>
            <span class="slider-val" id="distraction-val">2</span>
          </div>
          <input type="range" id="distractionHours" name="distractionHours" min="0" max="12" value="2"
            oninput="document.getElementById('distraction-val').textContent=this.value"/>
        </div>

        <div class="form-group">
          <label for="mood">Mood</label>
          <select id="mood" name="mood">
            <option value="Energized">⚡ Energized</option>
            <option value="Focused" selected>🎯 Focused</option>
            <option value="Calm">😌 Calm</option>
            <option value="Tired">😴 Tired</option>
            <option value="Stressed">😤 Stressed</option>
            <option value="Motivated">🔥 Motivated</option>
            <option value="Distracted">🌀 Distracted</option>
          </select>
        </div>
      </div>

      <div id="score-preview" style="margin-top:1.5rem; padding:1rem; background:var(--surface2); border-radius:var(--radius); border:1px solid var(--border); font-family:'DM Mono',monospace; font-size:0.85rem; color:var(--text-dim);">
        Predicted score: <span id="preview-score" style="color:var(--accent); font-weight:600;">—</span>
      </div>

      <button class="btn btn-primary" id="submit-btn" onclick="submitLog()" style="margin-top:1.25rem;">
        <span id="btn-text">Submit Today's Log</span>
      </button>
    </form>
  </div>

  <div class="card" id="result-card" style="display:none; animation-delay:0.2s;">
    <div class="card-header">
      <div class="card-icon">✅</div>
      <div>
        <div class="card-title">Log Submitted</div>
        <div class="card-subtitle">Here's your analysis</div>
      </div>
    </div>
    <div id="result-body"></div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<script>
  const API = 'https://stunning-garbanzo-69vxjpwrpv473rj5x.github.dev/api';
  const USER_ID = 1;

  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  function calcScore() {
    const s = +document.getElementById('studyHours').value;
    const sl = +document.getElementById('sleepHours').value;
    const d = +document.getElementById('distractionHours').value;
    return (s * 2) + (sl * 1.5) - (d * 2);
  }

  ['studyHours', 'sleepHours', 'distractionHours'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('preview-score').textContent = calcScore().toFixed(1);
    });
  });

  document.getElementById('preview-score').textContent = calcScore().toFixed(1);

  function toast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span class="toast-icon">${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  async function submitLog() {
    const btn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    btn.disabled = true;
    btnText.innerHTML = '<span class="spinner"></span> Analyzing...';

    const payload = {
      userId: USER_ID,
      studyHours: +document.getElementById('studyHours').value,
      sleepHours: +document.getElementById('sleepHours').value,
      distractionHours: +document.getElementById('distractionHours').value,
      mood: document.getElementById('mood').value
    };

    try {
      const res = await fetch(`${API}/logs`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error('Server error');
      const data = await res.json();

      const burnoutClass = data.burnoutStatus === 'High Burnout Risk' ? 'warn' : 'ok';
      const burnoutIcon = data.burnoutStatus === 'High Burnout Risk' ? '🔴' : '🟢';

      document.getElementById('result-body').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem;">
          <div style="text-align:center;">
            <div style="font-family:'DM Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.4rem;">Score</div>
            <div style="font-size:2rem;font-weight:800;color:var(--accent);">${data.productivityScore.toFixed(1)}</div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:'DM Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.4rem;">Burnout</div>
            <div style="font-size:0.85rem;font-weight:700;" class="${burnoutClass === 'warn' ? '' : ''}">${burnoutIcon} ${data.burnoutStatus}</div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:'DM Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.4rem;">Mood</div>
            <div style="font-size:0.95rem;font-weight:700;">${data.mood}</div>
          </div>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;font-size:0.875rem;color:var(--text-dim);">
          💡 ${data.suggestion}
        </div>
        <div style="margin-top:1rem;text-align:right;">
          <a href="dashboard.html" style="color:var(--accent);font-size:0.875rem;text-decoration:none;font-weight:600;">View Dashboard →</a>
        </div>
      `;

      document.getElementById('result-card').style.display = 'block';
      toast('Log submitted successfully!');
    } catch (e) {
      toast('Failed to submit log. Is the server running?', 'error');
    } finally {
      btn.disabled = false;
      btnText.textContent = 'Submit Today\'s Log';
    }
  }
</script>
</body>
</html>
